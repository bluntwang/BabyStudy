name: baby_study
description: A fun learning app for kids aged 3-6 to improve focus and logical thinking through educational games.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  riverpod: ^2.4.9
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0
  path: ^1.8.3
  audioplayers: ^5.2.1
  lottie: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/logo/
    - assets/audio/
